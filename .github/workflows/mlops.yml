name: MLOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mlops-pipeline:
    runs-on: ubuntu-22.04

    steps:
      # ── Step 1: Checkout code ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Set up Python ──────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ── Step 3: Install dependencies ──────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 4: Pull data from DVC/S3 when pointers are present ─────────
      - name: Pull data with DVC (optional)
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
        run: |
          if ls data/*.dvc >/dev/null 2>&1; then
            dvc pull
          else
            echo "No DVC pointer files found; training script will generate local datasets."
          fi

      # ── Step 5: Run all 5 training runs with MLflow ───────────
      - name: Run MLflow experiments
        env:
          MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python train.py --run 0

      # ── Step 6: Upload metrics as artifact ────────────────────
      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: experiment-metrics
          path: metrics/

      # ── Step 7: Build Docker image ────────────────────────────
      - name: Build Docker image
        run: |
          IMAGE_REPO="$(echo "${{ secrets.DOCKER_USERNAME }}/${{ secrets.ROLL_NO }}-mlops" | tr '[:upper:]' '[:lower:]')"
          docker build -t ${IMAGE_REPO}:${{ github.sha }} .
          docker tag ${IMAGE_REPO}:${{ github.sha }} ${IMAGE_REPO}:latest

      # ── Step 8: Push to Docker Hub ────────────────────────────
      - name: Login and push to Docker Hub
        run: |
          IMAGE_REPO="$(echo "${{ secrets.DOCKER_USERNAME }}/${{ secrets.ROLL_NO }}-mlops" | tr '[:upper:]' '[:lower:]')"
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${IMAGE_REPO}:${{ github.sha }}
          docker push ${IMAGE_REPO}:latest
